<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>亲爱的 L.I.T Crew</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="screen home-screen is-active" data-screen="home" aria-label="首页">
        <div class="home-bg" aria-hidden="true"></div>
        <div class="home-inner">
          <header class="home-header">
            <p>L.I.T Crew</p>
            <h1>亲爱的L.I.T Crew：</h1>
          </header>
          <nav class="member-grid" data-member-grid aria-label="成员信封入口"></nav>
          <p class="love-note">Love from泉皇</p>
        </div>
      </section>

      <section class="screen letter-screen" data-screen="letter" aria-label="专属信封">
        <button class="back-button" type="button" data-back>返回首页</button>
        <div class="recipient-name" data-recipient-name></div>

        <div class="letter-stage" data-letter-stage>
          <div class="paper-panel">
            <img class="paper-image" data-paper-image alt="专属信纸" />
          </div>

          <div class="envelope-wrap" aria-hidden="true">
            <img class="envelope envelope-closed" data-envelope-closed alt="" />
            <img class="envelope envelope-open" data-envelope-open alt="" />
          </div>

          <button class="seal-button" type="button" data-open-letter aria-label="点击火漆打开信封">
            <img data-letter-seal alt="" />
          </button>
        </div>
      </section>
    </main>

    <script src="./members.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
